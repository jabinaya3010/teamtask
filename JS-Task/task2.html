<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <main class="flex justify-center">
        <div class="flex flex-col gap-5 justify-center">
            <h1 class="font-bold text-2xl text-center">Register here</h1>
                <div class="flex flex-col gap-5 w-60 justify-center">
                <input id="userEmail" type="email" placeholder="Enter email" class="border border-black p-1 rounded">
                <input id="userNumber" type="text" placeholder="Enter number" class="border border-black p-1 rounded">
                <input id="userPassword" type="password" placeholder="Enter password" class="border border-black p-1 rounded">
            </div>
            <div class="text-center item-center">
                <button onclick="registerUser()" class="bg-blue-500 text-white p-2 w-50 rounded">Register</button>
            </div>
        </div>
    </main>

    <section  class="flex flex-col gap-5 justify-center item-center">
        <div class="flex flex-col gap-5 justify-center">
            <div>
            <h1 class="font-bold text-2xl text-center">login</h1>
        </div>
        <div  class="flex flex-col gap-5 w-60 justify-center">
            <input id="Email" type="email" placeholder="Enter email" class="border border-black p-1 rounded">
            <input id="Password" type="password" placeholder="Enter password" class="border border-black p-1 rounded">
        </div>
        <div>
            <button onclick="loginUser()" class="bg-blue-500 text-white p-2 w-50 rounded">Login</button>
        </div>
        </div>
    </section>

    <script>
        let arr = JSON.parse(localStorage.getItem("user")) || []
        function registerUser(){
            const useremail = document.getElementById("userEmail").value
            const usernumber = document.getElementById("userNumber").value
            const userpassword = document.getElementById("userPassword").value
        
        const datas = {useremail,usernumber,userpassword}
        arr.push(datas)

        localStorage.setItem("user",JSON.stringify(arr))

        alert("Register completed")
        }


         let array = JSON.parse(localStorage.getItem("log")) || []
        function loginUser(){
             const useremail = document.getElementById("Email").value
             const userpassword = document.getElementById("Password").value

              const data = {useremail,userpassword}
             array.push(data)

              localStorage.setItem("log",JSON.stringify(array))

             alert("login completed")
        } 
    </script>
</body>
</html>
